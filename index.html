<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>ひらがなシューター 🚀</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;
    -webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
  html,body{height:100%;overflow:hidden;
    font-family:'Hiragino Rounded Gothic Pro','ヒラギノ丸ゴ Pro W4','BIZ UDPGothic','Meiryo',sans-serif;
    background:#000;color:#fff;}

  #game{position:fixed;inset:0;}
  canvas{display:block;width:100%;height:100%;background:#0a0a2e;touch-action:none;}

  /* ───── HUD ───── */
  #hud{
    position:fixed;top:env(safe-area-inset-top,0);left:0;right:0;
    display:flex;justify-content:space-between;align-items:flex-start;
    padding:14px 16px;pointer-events:none;z-index:5;font-weight:bold;
  }
  .hud-pill{
    background:rgba(0,0,0,.55);border:2px solid rgba(255,255,255,.25);
    border-radius:18px;padding:7px 14px;font-size:1.05rem;
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  }
  #score   { color:#ffd700; }
  #lives   { color:#ff7675; }
  #combo   {
    position:fixed;top:60px;left:50%;transform:translateX(-50%);
    font-size:2.2rem;color:#ffeb3b;text-shadow:0 0 18px #ff6b6b,0 4px 0 #c0392b;
    pointer-events:none;opacity:0;transition:opacity .25s,transform .25s;z-index:5;
  }
  #combo.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1);
    animation:comboPop .55s ease;}
  @keyframes comboPop{
    0%   {transform:translateX(-50%) scale(.5) rotate(-8deg);}
    60%  {transform:translateX(-50%) scale(1.2) rotate(4deg);}
    100% {transform:translateX(-50%) scale(1)  rotate(0);}
  }

  /* ───── START SCREEN ───── */
  .overlay{
    position:fixed;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:22px;
    background:radial-gradient(circle at 50% 30%,#3a1c71 0%,#0a0a2e 80%);
    z-index:10;text-align:center;padding:24px;
  }
  .overlay.hidden{display:none;}
  .ttl{
    font-size:clamp(2.4rem,9vw,3.6rem);
    background:linear-gradient(135deg,#f093fb,#f5576c 50%,#ffd700);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 4px 0 rgba(0,0,0,.25);line-height:1.15;
    animation:bob 2s ease-in-out infinite;
  }
  .sub{font-size:1.05rem;color:#ddd;line-height:1.8;
    background:rgba(255,255,255,.08);border-radius:18px;
    padding:14px 22px;max-width:340px;}
  .big-btn{
    background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;
    border:none;border-radius:30px;padding:18px 44px;
    font-size:1.4rem;font-family:inherit;font-weight:bold;cursor:pointer;
    box-shadow:0 7px 0 #b5154d,0 12px 30px rgba(245,87,108,.4);
    transition:transform .1s,box-shadow .1s;
  }
  .big-btn:active{transform:translateY(5px);box-shadow:0 2px 0 #b5154d;}
  .small-btn{
    background:rgba(255,255,255,.15);color:#fff;border:2px solid rgba(255,255,255,.4);
    border-radius:20px;padding:9px 22px;font-size:1rem;font-family:inherit;cursor:pointer;
  }
  .hi-score{font-size:1rem;color:#ffd700;}
  .game-over-stats{
    background:rgba(255,255,255,.08);border-radius:20px;
    padding:18px 24px;font-size:1.1rem;line-height:1.9;min-width:240px;
  }
  .go-score{font-size:2.2rem;color:#ffd700;line-height:1;margin:8px 0;}
  .go-best {color:#aaa;font-size:.9rem;}
  .new-best{color:#ff6b6b;font-size:1rem;font-weight:bold;}

  /* ───── BACKGROUND STARS ───── */
  #stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
  .star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;
    animation:twinkle linear infinite;}
  @keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
</style>
</head>
<body>

<div id="stars"></div>

<div id="game">
  <canvas id="cvs"></canvas>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-pill" id="score">⭐ 0</div>
  <div class="hud-pill" id="lives">❤️ ❤️ ❤️</div>
</div>
<div id="combo"></div>

<!-- Start screen -->
<div id="startOverlay" class="overlay">
  <div class="ttl">ひらがな<br>シューター 🚀</div>
  <div class="sub">
    🚀を うごかして<br>
    おちてくる ひらがなを <strong>うってね！</strong><br>
    あたると おとが でるよ 🔊
  </div>
  <button class="big-btn" onclick="startGame()">▶ はじめる！</button>
  <div class="hi-score" id="bestScore">ハイスコア: 0</div>
</div>

<!-- Game over -->
<div id="overOverlay" class="overlay hidden">
  <div class="ttl" style="font-size:clamp(2rem,7vw,3rem);">ゲーム<br>オーバー！</div>
  <div class="game-over-stats">
    <div>スコア</div>
    <div class="go-score" id="overScore">0</div>
    <div class="go-best" id="overBest">ベスト: 0</div>
    <div id="overNewBest" class="new-best" style="display:none">🎉 ハイスコア こうしん！</div>
  </div>
  <button class="big-btn" onclick="startGame()">もういちど！</button>
  <button class="small-btn" onclick="backToStart()">トップへ</button>
</div>

<script>
// ============================================================
//  HIRAGANA DATA (uses pre-recorded audio files)
// ============================================================
const HIRAGANA = [
  {c:'あ',g:1},{c:'い',g:1},{c:'う',g:1},{c:'え',g:1},{c:'お',g:1},
  {c:'か',g:2},{c:'き',g:2},{c:'く',g:2},{c:'け',g:2},{c:'こ',g:2},
  {c:'さ',g:3},{c:'し',g:3},{c:'す',g:3},{c:'せ',g:3},{c:'そ',g:3},
  {c:'た',g:4},{c:'ち',g:4},{c:'つ',g:4},{c:'て',g:4},{c:'と',g:4},
  {c:'な',g:5},{c:'に',g:5},{c:'ぬ',g:5},{c:'ね',g:5},{c:'の',g:5},
  {c:'は',g:6},{c:'ひ',g:6},{c:'ふ',g:6},{c:'へ',g:6},{c:'ほ',g:6},
  {c:'ま',g:7},{c:'み',g:7},{c:'む',g:7},{c:'め',g:7},{c:'も',g:7},
  {c:'や',g:8},{c:'ゆ',g:8},{c:'よ',g:8},
  {c:'ら',g:9},{c:'り',g:9},{c:'る',g:9},{c:'れ',g:9},{c:'ろ',g:9},
  {c:'わ',g:10},{c:'を',g:10},{c:'ん',g:10},
];

// Group color palette (for hiragana bubbles)
const GROUP_COLORS = {
  1:['#ff7675','#d63031'], 2:['#fd79a8','#e84393'], 3:['#fdcb6e','#f39c12'],
  4:['#55efc4','#00b894'], 5:['#74b9ff','#0984e3'], 6:['#a29bfe','#6c5ce7'],
  7:['#ffeaa7','#fdcb6e'], 8:['#81ecec','#00cec9'], 9:['#ff9ff3','#feca57'],
  10:['#48dbfb','#341f97'],
};

// ============================================================
//  AUDIO
// ============================================================
const _audioCache = {};
function getAudio(path){
  if(!_audioCache[path]){
    const a=new Audio(path); a.preload='auto'; _audioCache[path]=a;
  }
  return _audioCache[path];
}
function speakChar(char){
  const a = getAudio(`audio/${encodeURIComponent(char)}.m4a`);
  a.currentTime = 0;
  a.play().catch(()=>{});
}

// Web Audio for SFX
let actx=null;
function getCtx(){ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); return actx; }
function sfx(type){
  try{
    const ctx=getCtx();
    if(type==='shoot'){
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type='square'; o.frequency.setValueAtTime(880,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(220,ctx.currentTime+.08);
      g.gain.setValueAtTime(.06,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.1);
      o.start(); o.stop(ctx.currentTime+.1);
    }else if(type==='hit'){
      [[660,0],[880,.06]].forEach(([f,d])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type='sine'; o.frequency.value=f;
        const t=ctx.currentTime+d;
        g.gain.setValueAtTime(.18,t);
        g.gain.exponentialRampToValueAtTime(.001,t+.2);
        o.start(t); o.stop(t+.2);
      });
    }else if(type==='miss'){
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type='sawtooth'; o.frequency.setValueAtTime(220,ctx.currentTime);
      o.frequency.linearRampToValueAtTime(80,ctx.currentTime+.4);
      g.gain.setValueAtTime(.18,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.4);
      o.start(); o.stop(ctx.currentTime+.4);
    }else if(type==='gameover'){
      [[440,0],[330,.15],[247,.3],[196,.45]].forEach(([f,d])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type='triangle'; o.frequency.value=f;
        const t=ctx.currentTime+d;
        g.gain.setValueAtTime(.18,t);
        g.gain.exponentialRampToValueAtTime(.001,t+.4);
        o.start(t); o.stop(t+.4);
      });
    }
  }catch(_){}
}

// ============================================================
//  STARFIELD BACKGROUND (CSS)
// ============================================================
(function(){
  const layer=document.getElementById('stars');
  for(let i=0;i<60;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=1+Math.random()*2.5;
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;
      width:${sz}px;height:${sz}px;
      animation-duration:${1.5+Math.random()*3}s;
      animation-delay:${Math.random()*3}s;`;
    layer.appendChild(s);
  }
})();

// ============================================================
//  GAME
// ============================================================
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');

let DPR = Math.min(window.devicePixelRatio||1, 2);
let W=0, H=0;

function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  cvs.width  = W * DPR;
  cvs.height = H * DPR;
  cvs.style.width  = W+'px';
  cvs.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize);
resize();

// State
let running=false, gameOver=false;
let score=0, combo=0, comboTimer=0, lives=3;
let lastTime=0, lastSpawn=0, lastShot=0;
let elapsedTime=0;
let bestScore = +(localStorage.getItem('hiragana_shooter_best')||0);
document.getElementById('bestScore').textContent = `ハイスコア: ${bestScore}`;

const ship = { x:0, y:0, w:60, h:60, targetX:0 };
const bullets   = [];
const enemies   = [];   // hiragana
const particles = [];
const popups    = [];   // floating "+10" texts

// Difficulty curves (functions of elapsedTime in seconds)
function spawnInterval(t){ return Math.max(450, 1500 - t*15); }
function fallSpeed(t){     return 50 + Math.min(t*2.0, 110); }

// ── INPUT ─────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e=>{
  keys[e.key]=true;
  if(['ArrowLeft','ArrowRight',' ','a','A','d','D'].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e=>{ keys[e.key]=false; });

cvs.addEventListener('mousemove', e=>{ if(running) ship.targetX = e.clientX; });
cvs.addEventListener('touchstart', e=>{
  e.preventDefault();
  if(running) ship.targetX = e.touches[0].clientX;
}, {passive:false});
cvs.addEventListener('touchmove', e=>{
  e.preventDefault();
  if(running) ship.targetX = e.touches[0].clientX;
}, {passive:false});

// ── GAME CONTROL ──────────────────────────────────────
function startGame(){
  // Unlock audio context (for mobile)
  try{ getCtx().resume(); }catch(_){}

  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('overOverlay').classList.add('hidden');

  bullets.length = 0;
  enemies.length = 0;
  particles.length = 0;
  popups.length = 0;

  score = 0;
  combo = 0;
  comboTimer = 0;
  lives = 3;
  elapsedTime = 0;
  lastSpawn = lastShot = lastTime = performance.now();

  ship.x = ship.targetX = W/2;
  ship.y = H - 90;

  updateHUD();
  running = true;
  gameOver = false;
  requestAnimationFrame(loop);
}

function backToStart(){
  document.getElementById('overOverlay').classList.add('hidden');
  document.getElementById('startOverlay').classList.remove('hidden');
}

function endGame(){
  running = false;
  gameOver = true;
  sfx('gameover');

  const isNewBest = score > bestScore;
  if(isNewBest){
    bestScore = score;
    localStorage.setItem('hiragana_shooter_best', score);
  }
  document.getElementById('overScore').textContent = `⭐ ${score}`;
  document.getElementById('overBest').textContent  = `ベスト: ${bestScore}`;
  document.getElementById('overNewBest').style.display = isNewBest ? 'block':'none';
  document.getElementById('bestScore').textContent = `ハイスコア: ${bestScore}`;

  setTimeout(()=>{
    document.getElementById('overOverlay').classList.remove('hidden');
  }, 800);
}

function updateHUD(){
  document.getElementById('score').textContent = `⭐ ${score}`;
  document.getElementById('lives').textContent = '❤️'.repeat(Math.max(0,lives)) + '🖤'.repeat(Math.max(0,3-lives));
}

// ── COMBO POPUP ───────────────────────────────────────
function showCombo(){
  if(combo<2) return;
  const el = document.getElementById('combo');
  el.textContent = `🔥 ${combo} コンボ！`;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  clearTimeout(showCombo._t);
  showCombo._t = setTimeout(()=> el.classList.remove('show'), 1100);
}

// ── UPDATE ────────────────────────────────────────────
function update(dt){
  elapsedTime += dt;

  // Ship movement (keyboard)
  if(keys['ArrowLeft']  || keys['a'] || keys['A']) ship.targetX -= 380*dt;
  if(keys['ArrowRight'] || keys['d'] || keys['D']) ship.targetX += 380*dt;
  ship.targetX = Math.max(35, Math.min(W-35, ship.targetX));

  // Smooth follow
  ship.x += (ship.targetX - ship.x) * Math.min(1, dt*16);
  ship.y = H - 90;

  // Auto-shoot
  const now = performance.now();
  if(now - lastShot > 320){
    bullets.push({ x:ship.x, y:ship.y - 30, vy:-720 });
    lastShot = now;
    sfx('shoot');
  }

  // Bullets
  for(let i=bullets.length-1;i>=0;i--){
    const b = bullets[i];
    b.y += b.vy*dt;
    if(b.y < -30) bullets.splice(i,1);
  }

  // Spawn enemies
  if(now - lastSpawn > spawnInterval(elapsedTime)){
    spawnEnemy();
    lastSpawn = now;
  }

  // Update enemies
  const baseSpeed = fallSpeed(elapsedTime);
  for(let i=enemies.length-1;i>=0;i--){
    const e = enemies[i];
    e.y += e.vy * dt;
    e.rot += e.vr * dt;
    if(e.y > H + 60){
      enemies.splice(i,1);
      // missed: lose a life
      lives--;
      sfx('miss');
      shake = 18;
      updateHUD();
      combo = 0;
      if(lives<=0) endGame();
    }
  }

  // Collision: bullets ↔ enemies
  outer:
  for(let i=bullets.length-1;i>=0;i--){
    const b = bullets[i];
    for(let j=enemies.length-1;j>=0;j--){
      const e = enemies[j];
      const dx = b.x - e.x, dy = b.y - e.y;
      if(dx*dx + dy*dy < e.r*e.r){
        bullets.splice(i,1);
        onHit(e);
        enemies.splice(j,1);
        continue outer;
      }
    }
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.x += p.vx*dt; p.y += p.vy*dt;
    p.vy += 350*dt;     // gravity-ish
    p.life -= dt;
    if(p.life <= 0) particles.splice(i,1);
  }

  // Score popups
  for(let i=popups.length-1;i>=0;i--){
    const p = popups[i];
    p.y -= 60*dt;
    p.life -= dt;
    if(p.life <= 0) popups.splice(i,1);
  }

  // Camera shake decay
  if(shake>0) shake = Math.max(0, shake - 60*dt);

  // Combo timer
  if(combo>0){
    comboTimer -= dt;
    if(comboTimer<=0) combo = 0;
  }
}

function spawnEnemy(){
  const h = HIRAGANA[(Math.random()*HIRAGANA.length)|0];
  const r = 36;
  enemies.push({
    c:h.c, g:h.g, r,
    x: r+10 + Math.random()*(W-r*2-20),
    y: -r,
    vy: fallSpeed(elapsedTime) + Math.random()*40,
    rot: 0, vr: (Math.random()-.5)*1.5,
  });
}

function onHit(e){
  speakChar(e.c);
  sfx('hit');

  combo++;
  comboTimer = 2.4;
  const gained = 10 * combo;
  score += gained;
  updateHUD();
  if(combo>=2) showCombo();

  // explosion particles
  const cols = GROUP_COLORS[e.g];
  for(let i=0;i<24;i++){
    const a = Math.random()*Math.PI*2;
    const sp= 120 + Math.random()*240;
    particles.push({
      x:e.x, y:e.y,
      vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      life: .55 + Math.random()*.45,
      max: 1,
      r: 2.5 + Math.random()*3,
      color: i%2===0 ? cols[0] : cols[1],
    });
  }
  // big white flash particle
  particles.push({x:e.x,y:e.y,vx:0,vy:0,life:.18,r:e.r*1.3,color:'#fff',flash:true});

  popups.push({ x:e.x, y:e.y-20, text:`+${gained}`, life:1.1 });

  shake = Math.min(20, shake + 6);
}

// ── DRAW ──────────────────────────────────────────────
let shake = 0;
function draw(){
  // Background gradient
  const grd = ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0, '#0f0c29');
  grd.addColorStop(.5,'#3a1c71');
  grd.addColorStop(1, '#0a0a2e');
  ctx.fillStyle = grd;
  ctx.fillRect(0,0,W,H);

  // Camera shake
  ctx.save();
  if(shake>0){
    const sx = (Math.random()-.5)*shake;
    const sy = (Math.random()-.5)*shake;
    ctx.translate(sx, sy);
  }

  // Hiragana enemies (bubbles)
  enemies.forEach(e=>{
    const cols = GROUP_COLORS[e.g];
    // Glow
    ctx.shadowBlur  = 28;
    ctx.shadowColor = cols[0];
    // Body
    const grad = ctx.createRadialGradient(e.x-e.r*.3, e.y-e.r*.4, e.r*.1, e.x, e.y, e.r);
    grad.addColorStop(0, '#fff');
    grad.addColorStop(.25, cols[0]);
    grad.addColorStop(1, cols[1]);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.save();
    ctx.translate(e.x,e.y);
    ctx.rotate(e.rot);
    ctx.arc(0,0, e.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    ctx.shadowBlur = 0;

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,.4)';
    ctx.beginPath();
    ctx.arc(e.x-e.r*.35, e.y-e.r*.4, e.r*.3, 0, Math.PI*2);
    ctx.fill();

    // Character (no rotation for readability)
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${(e.r*1.4)|0}px 'Hiragino Rounded Gothic Pro',sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowBlur = 6;
    ctx.shadowColor = 'rgba(0,0,0,.4)';
    ctx.fillText(e.c, e.x, e.y);
    ctx.shadowBlur = 0;
  });

  // Particles
  particles.forEach(p=>{
    if(p.flash){
      ctx.globalAlpha = p.life * 5;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fill();
    }else{
      ctx.globalAlpha = Math.min(1, p.life * 2);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fill();
    }
  });
  ctx.globalAlpha = 1;

  // Bullets
  bullets.forEach(b=>{
    ctx.shadowBlur=14; ctx.shadowColor='#ffeb3b';
    const g = ctx.createRadialGradient(b.x,b.y,1, b.x,b.y,8);
    g.addColorStop(0,'#fff');
    g.addColorStop(.5,'#ffeb3b');
    g.addColorStop(1,'#ff9800');
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(b.x, b.y, 8, 0, Math.PI*2); ctx.fill();
    // tail
    ctx.fillStyle='rgba(255,235,59,.3)';
    ctx.beginPath(); ctx.arc(b.x, b.y+12, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(b.x, b.y+22, 3, 0, Math.PI*2); ctx.fill();
  });
  ctx.shadowBlur = 0;

  // Ship (rocket emoji + thruster flame)
  if(running){
    // Thruster
    const flameH = 20 + Math.sin(performance.now()/40)*5;
    const fg = ctx.createLinearGradient(ship.x, ship.y+18, ship.x, ship.y+18+flameH);
    fg.addColorStop(0, '#ffeb3b');
    fg.addColorStop(.5,'#ff9800');
    fg.addColorStop(1, 'rgba(255,87,34,0)');
    ctx.fillStyle = fg;
    ctx.beginPath();
    ctx.moveTo(ship.x-12, ship.y+18);
    ctx.lineTo(ship.x+12, ship.y+18);
    ctx.lineTo(ship.x,    ship.y+18+flameH);
    ctx.closePath();
    ctx.fill();

    // Rocket emoji
    ctx.font = '60px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowBlur = 18;
    ctx.shadowColor = '#fff';
    ctx.fillText('🚀', ship.x, ship.y);
    ctx.shadowBlur = 0;
  }

  // Score popups
  popups.forEach(p=>{
    ctx.globalAlpha = Math.min(1, p.life);
    ctx.fillStyle = '#ffd700';
    ctx.font = `bold 26px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowBlur = 8;
    ctx.shadowColor = '#000';
    ctx.fillText(p.text, p.x, p.y);
    ctx.shadowBlur = 0;
  });
  ctx.globalAlpha = 1;

  ctx.restore();
}

// ── MAIN LOOP ─────────────────────────────────────────
function loop(now){
  const dt = Math.min((now-lastTime)/1000, 0.05);
  lastTime = now;
  if(running) update(dt);
  draw();
  if(running) requestAnimationFrame(loop);
}

// First frame so background renders behind start screen
draw();
</script>
</body>
